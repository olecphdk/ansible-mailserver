- name: Install OpenDKIM and tools
  dnf:
    name:
      - opendkim
      - opendkim-tools
    state: present

- name: Create key dirs
  file:
    path: "/etc/opendkim/keys/{{ item }}"
    state: directory
    owner: opendkim
    group: opendkim
    mode: '0750'
  loop: "{{ hosted_domains }}"

- name: Generate DKIM keys
  command: >
    opendkim-genkey -b 2048 -h rsa-sha256 -r
    -s {{ opendkim_selector }}
    -d {{ item }}
  args:
    chdir: "/etc/opendkim/keys/{{ item }}"
    creates: "/etc/opendkim/keys/{{ item }}/{{ opendkim_selector }}.private"
  loop: "{{ hosted_domains }}"

- name: Set key perms
  file:
    path: "/etc/opendkim/keys/{{ item }}/{{ opendkim_selector }}.private"
    owner: opendkim
    group: opendkim
    mode: '0600'
  loop: "{{ hosted_domains }}"

- name: Deploy KeyTable
  template:
    src: KeyTable.j2
    dest: /etc/opendkim/KeyTable
    owner: opendkim
    group: opendkim
    mode: '0640'
  notify: Restart OpenDKIM

- name: Deploy SigningTable
  template:
    src: SigningTable.j2
    dest: /etc/opendkim/SigningTable
    owner: opendkim
    group: opendkim
    mode: '0640'
  notify: Restart OpenDKIM

- name: Deploy TrustedHosts
  template:
    src: TrustedHosts.j2
    dest: /etc/opendkim/TrustedHosts
    owner: opendkim
    group: opendkim
    mode: '0640'
  notify: Restart OpenDKIM

- name: Configure OpenDKIM
  copy:
    dest: /etc/opendkim.conf
    content: |
      Syslog                  yes
      UMask                   002
      OversignHeaders         From
      KeyTable                /etc/opendkim/KeyTable
      SigningTable            refile:/etc/opendkim/SigningTable
      InternalHosts           /etc/opendkim/TrustedHosts
      Socket                  {{ opendkim_socket }}
      Canonicalization        relaxed/simple
      Mode                    sv
      SubDomains              no
      AutoRestart             yes
      Background              yes
  notify: Restart OpenDKIM

- name: Enable OpenDKIM
  service:
    name: opendkim
    state: started
    enabled: true
